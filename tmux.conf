# prefixをCtrl-qに変更（Ctrl-bはEmacs風カーソル移動と競合するため）
unbind C-b
set -g prefix C-q
bind C-q send-prefix

# マウス操作を有効化（スクロール、ペイン選択、リサイズ）
set -g mouse on

# スクロールバッファを増やす（デフォルト2000では足りないことが多い）
set -g history-limit 50000

# ペイン番号を1から開始（0は直感的でない）
set -gw pane-base-index 1

# 256色・True Color対応
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# ステータスバー全体の配色
set -g status-style "bg=colour235,fg=colour248"

# アクティブウィンドウを目立たせる
set -gw window-status-current-style "bg=colour255,fg=colour232,bold"
set -gw window-status-current-format " #I:#W "

# 非アクティブウィンドウ
set -gw window-status-style "bg=colour235,fg=colour244"
set -gw window-status-format " #I:#W "

# ステータスバー左側
set -g status-left "[#S] "
set -g status-left-length 20

# ステータスバー右側
set -g status-right " %H:%M %d-%b"
set -g status-right-length 30

# --- Plugins (TPM) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# セッションを自動保存・自動復元
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# TPMの初期化（この行は必ず設定ファイルの末尾に置く）
run '~/.tmux/plugins/tpm/tpm'
